<!DOCTYPE html>
<html>
<head>
    <title>AI Image Detection</title>

    <style>
        body {
            background: linear-gradient(to right, #0b1c3d, #08142c);
            color: white;
            font-family: Arial;
            text-align: center;
        }

        h1 {
            margin-top: 30px;
        }

        .upload-box {
            margin: 20px;
        }

        button {
            background: #4c6ef5;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 6px;
            cursor: pointer;
        }

        .result {
            font-size: 28px;
            color: orange;
        }

        .label {
            font-size: 20px;
            margin-bottom: 20px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }
        
        .box {
           background: #1b2b4b;
           padding: 20px;
           border-radius: 12px;
           width: 500px;   /* 🔥 Bigger */
        }
        
        .image-container {
            width: 100%;
            height: 400px;  /* 🔥 Bigger height */
            overflow: hidden;
            border-radius: 10px;
        }
        
        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

    </style>
</head>

<body>

    <h1>AI Generated Image Detection</h1>

    <form method="POST" enctype="multipart/form-data" class="upload-box">
        <input type="file" name="image" required>
        <button type="submit">Analyze</button>
    </form>

    {% if result %}
        <div class="result">{{ confidence }}%</div>
        <div class="label">{{ result }}</div>

        <div class="container">

            <!-- Original Image -->
            <div class="box">
                <p>Original Image</p>
                <div class="image-container">
                    <img src="data:image/jpeg;base64,{{ image_data }}">
                </div>
            </div>

            <!-- Heatmap -->
            <div class="box">
                <p>Model Explanation (Heatmap)</p>
                <div class="image-container">
                    <img src="data:image/jpeg;base64,{{ heatmap_data }}">
                </div>
            </div>

        </div>
    {% endif %}

</body>
</html>
